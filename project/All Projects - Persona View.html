<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>dealio — All Projects</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg: #FFFFFF;
    --bg-2: #FAFAF8;
    --bg-3: #F4F4EF;
    --ink: #0E1411;
    --ink-2: #1F2925;
    --muted: #8E948F;
    --muted-2: #C7CAC5;
    --line: #ECECE7;
    --line-2: #F4F4F0;
    --hover: #FBFBF8;

    --sage: #D8E5DA;   --sage-ink: #3C5A45;   --sage-tint: #EEF3EF;
    --sand: #F1E9DA;   --sand-ink: #7A5E2F;   --sand-tint: #F8F4EB;
    --sky:  #DCE6F1;   --sky-ink:  #3F567A;   --sky-tint:  #ECF1F7;
    --lilac:#E6E0EE;   --lilac-ink:#574879;   --lilac-tint:#F2EEF7;
    --rose: #F0DDD9;   --rose-ink: #874B3D;   --rose-tint: #F8ECE9;

    --serif: "Fraunces", "Times New Roman", serif;
    --sans:  "Geist", ui-sans-serif, system-ui, sans-serif;
    --mono:  "Geist Mono", ui-monospace, monospace;
  }

  /* Persona accents */
  body[data-persona="builder"]   { --accent: var(--sand);  --accent-ink: var(--sand-ink);  --accent-tint: var(--sand-tint); }
  body[data-persona="customer"]  { --accent: var(--sage);  --accent-ink: var(--sage-ink);  --accent-tint: var(--sage-tint); }
  body[data-persona="partner"]   { --accent: var(--lilac); --accent-ink: var(--lilac-ink); --accent-tint: var(--lilac-tint); }

  *{ box-sizing:border-box; }
  html, body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
    min-height: 100vh;
  }

  .app{ display:grid; grid-template-columns: 220px 1fr; min-height:100vh; }

  /* ============= sidebar ============= */
  .side{
    border-right: 1px solid var(--line);
    padding: 28px 20px;
    position: sticky; top: 0; height: 100vh;
    display:flex; flex-direction:column; gap: 28px;
    background: var(--bg);
  }
  .brand{
    display:flex; align-items:center; gap: 10px;
    font-family: var(--serif);
    font-size: 22px; font-weight: 400;
    letter-spacing: -0.02em;
  }
  .brand-dot{
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent-ink);
    transition: background .3s ease;
  }
  .brand em{ font-style: italic; color: var(--muted); font-weight: 300; }

  .nav-group{ display:flex; flex-direction:column; gap: 2px; }
  .nav-label{
    font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); padding: 0 10px 6px;
    font-weight: 500;
  }
  .nav a{
    display:flex; align-items:center; gap: 11px;
    padding: 8px 10px;
    border-radius: 8px;
    color: var(--ink-2);
    text-decoration: none;
    font-size: 13.5px;
    transition: background .12s ease, color .12s ease;
  }
  .nav a:hover{ background: var(--hover); }
  .nav a.active{ background: var(--bg-2); color: var(--ink); font-weight: 500; }
  .nav a svg{ flex-shrink: 0; opacity: .65; }
  .nav a.active svg{ opacity: 1; color: var(--accent-ink); }
  .nav a .num{ margin-left: auto; font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .side-foot{
    margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line);
    display:flex; gap: 10px; align-items:center;
  }
  .ava{
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent); color: var(--accent-ink);
    display:grid; place-items:center;
    font-weight: 600; font-size: 12px;
    transition: background .3s ease, color .3s ease;
  }
  .side-foot .who b{ font-size: 13px; font-weight: 500; display:block; }
  .side-foot .who small{ font-size: 11.5px; color: var(--muted); }

  /* ============= main ============= */
  main{
    padding: 32px 48px 96px;
    max-width: 1480px;
    min-width: 0;
  }

  /* ============= TOP BAR ============= */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 36px;
    gap: 24px;
    flex-wrap: wrap;
  }
  .crumbs{
    font-size: 12.5px;
    color: var(--muted);
    display:flex; align-items:center; gap: 8px;
  }
  .crumbs b{ color: var(--ink); font-weight: 500; }
  .crumbs .arr{ color: var(--muted-2); }

  /* PERSONA PILL */
  .persona-pill{
    display: inline-flex; align-items: center;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px; gap: 2px;
  }
  .persona-btn{
    border: none; background: transparent;
    font-family: var(--sans);
    font-size: 12.5px; font-weight: 500;
    color: var(--muted);
    padding: 7px 14px 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: color .15s ease;
  }
  .persona-btn .pdot{
    width: 8px; height: 8px; border-radius: 50%;
    transition: transform .25s ease;
  }
  .persona-btn[data-p="builder"] .pdot{ background: var(--sand-ink); }
  .persona-btn[data-p="customer"] .pdot{ background: var(--sage-ink); }
  .persona-btn[data-p="partner"] .pdot{ background: var(--lilac-ink); }
  .persona-btn:hover{ color: var(--ink-2); }
  .persona-btn[aria-pressed="true"]{
    color: var(--ink);
    background: var(--bg);
    box-shadow: 0 1px 2px rgba(14,20,17,0.06), 0 0 0 1px var(--line);
  }
  .persona-btn[aria-pressed="true"] .pdot{ transform: scale(1.25); }

  .top-right{ display:flex; gap: 10px; align-items: center; }
  .icon-btn{
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg); color: var(--ink-2);
    display: grid; place-items: center;
    cursor: pointer;
  }
  .icon-btn:hover{ background: var(--hover); }

  /* ============= HERO ============= */
  .hero{
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 40px;
    margin-bottom: 36px;
  }
  .h-title{
    font-family: var(--serif);
    font-size: clamp(52px, 5.8vw, 88px);
    font-weight: 300;
    line-height: 0.98;
    letter-spacing: -0.028em;
    margin: 0;
  }
  .h-title em{ font-style: italic; color: var(--accent-ink); font-weight: 300; transition: color .3s ease; }
  .h-sub{
    margin: 16px 0 0;
    font-size: 14.5px;
    color: var(--muted);
    max-width: 560px;
    line-height: 1.55;
  }
  .h-sub b{ color: var(--ink); font-weight: 500; }
  .h-cta{ display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .btn{
    display:inline-flex; align-items:center; gap: 8px;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    font-family: var(--sans);
    border: 1px solid transparent;
    cursor: pointer; text-decoration: none;
    color: var(--ink);
    transition: all .15s ease;
  }
  .btn-ghost{ border-color: var(--line); background: var(--bg); }
  .btn-ghost:hover{ background: var(--hover); }
  .btn-primary{ background: var(--ink); color: var(--bg); }
  .btn-accent{ background: var(--accent-ink); color: var(--bg); transition: background .3s ease; }

  /* ============= TOOLBAR ============= */
  .toolbar{
    display: flex; align-items: center; gap: 16px;
    padding: 16px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .tabs{ display:flex; gap: 2px; }
  .tab{
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12.5px; font-weight: 500;
    color: var(--muted);
    cursor: pointer; border: none;
    background: transparent;
    font-family: var(--sans);
    display: inline-flex; align-items: center; gap: 6px;
    transition: color .12s ease;
  }
  .tab:hover{ color: var(--ink-2); }
  .tab[aria-pressed="true"]{ background: var(--bg-2); color: var(--ink); }
  .tab .ct{ font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; font-family: var(--mono); }
  .tab[aria-pressed="true"] .ct{ color: var(--ink-2); }

  .tool-right{ margin-left: auto; display:flex; gap: 10px; align-items: center; }
  .search{
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    width: 240px; background: var(--bg);
    transition: border-color .15s ease;
  }
  .search:focus-within{ border-color: var(--ink-2); }
  .search input{
    border: none; outline: none; background: transparent;
    font-family: var(--sans); font-size: 13px;
    color: var(--ink); flex: 1; min-width: 0;
  }
  .search input::placeholder{ color: var(--muted); }
  .sort{
    padding: 7px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--bg);
    font-family: var(--sans); font-size: 12.5px;
    color: var(--ink-2);
    cursor: pointer;
    display:inline-flex; align-items:center; gap:8px;
  }

  /* ============= GRID ============= */
  .grid{
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 32px 24px;
  }
  .card{
    background: transparent;
    border: none;
    position: relative;
    cursor: pointer;
    display: flex; flex-direction: column;
    gap: 12px;
    min-width: 0;
    transition: transform .25s cubic-bezier(.2,.6,.3,1);
  }
  .card:hover{ transform: translateY(-3px); }

  .card-media{
    position: relative;
    aspect-ratio: 5/4;
    border-radius: 16px;
    overflow: hidden;
    background: var(--bg-2);
  }
  .ph{
    width: 100%; height: 100%;
    display: grid; place-items: center;
    position: relative; overflow: hidden;
    color: var(--accent-ink);
  }
  .ph::before{
    content:'';
    position: absolute; inset: 0;
    background:
      radial-gradient(60% 60% at 30% 30%, color-mix(in srgb, white 30%, transparent), transparent 70%),
      radial-gradient(40% 40% at 80% 90%, color-mix(in srgb, white 22%, transparent), transparent 65%);
  }
  .ph[data-tone="sage"]{ background: linear-gradient(135deg, var(--sage), var(--sage-tint)); color: var(--sage-ink); }
  .ph[data-tone="sand"]{ background: linear-gradient(135deg, var(--sand), var(--sand-tint)); color: var(--sand-ink); }
  .ph[data-tone="sky"]{  background: linear-gradient(135deg, var(--sky),  var(--sky-tint));  color: var(--sky-ink); }
  .ph[data-tone="lilac"]{ background: linear-gradient(135deg, var(--lilac), var(--lilac-tint)); color: var(--lilac-ink); }
  .ph[data-tone="rose"]{ background: linear-gradient(135deg, var(--rose), var(--rose-tint)); color: var(--rose-ink); }
  .ph-letter{
    position: relative; z-index: 1;
    font-family: var(--serif);
    font-size: 96px; line-height: 1;
    font-weight: 300; font-style: italic;
    opacity: .50;
  }

  /* MEDIA OVERLAYS (persona-specific) */
  .ovl-tl{
    position: absolute; top: 12px; left: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px 5px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(6px);
    font-size: 11.5px; font-weight: 500;
    color: var(--ink);
  }
  .ovl-tl .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: #3FA66A;
    box-shadow: 0 0 0 3px rgba(63,166,106,.18);
  }
  .ovl-tl.uc .dot{ background: #C69A5A; box-shadow: 0 0 0 3px rgba(198,154,90,.18); }
  .ovl-tl.new .dot{ background: var(--lilac-ink); box-shadow: 0 0 0 3px var(--lilac); }

  .ovl-tr{
    position: absolute; top: 12px; right: 12px;
    font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink);
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(6px);
    padding: 5px 10px;
    border-radius: 999px;
  }
  .ovl-tr.commission{
    background: var(--ink);
    color: #fff;
    font-family: var(--mono);
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px 4px 8px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .ovl-tr.commission::before{
    content:''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }
  .ovl-tr.high{ background: var(--accent-ink); }
  .ovl-tr.saved{
    background: var(--bg);
    padding: 6px;
    border: 1px solid var(--line);
  }
  .ovl-tr.saved svg{ display: block; color: var(--accent-ink); }
  .ovl-tr.saved.on{ background: var(--accent-ink); }
  .ovl-tr.saved.on svg{ color: #fff; }

  /* metric strip overlay (bottom-left for builder, shows live count) */
  .ovl-bl{
    position: absolute; left: 12px; bottom: 12px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 10px 6px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(8px);
    font-size: 11px;
    color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .ovl-bl b{ color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
  .ovl-bl .ppl{
    display: flex; align-items: center;
  }
  .ovl-bl .ppl span{
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1.5px solid #fff;
    background: var(--accent);
    margin-left: -4px;
  }
  .ovl-bl .ppl span:first-child{ margin-left: 0; }

  /* ============= CARD BODY ============= */
  .card-body{ display:flex; flex-direction:column; gap: 4px; padding: 0 2px; }
  .name-row{
    display:flex; align-items: baseline; justify-content: space-between;
    gap: 12px;
  }
  .name{
    font-family: var(--serif);
    font-size: 24px; font-weight: 300;
    letter-spacing: -0.015em;
    line-height: 1.1;
    margin: 0;
  }
  .price{
    font-family: var(--sans);
    font-variant-numeric: tabular-nums;
    font-size: 13px; font-weight: 500;
    color: var(--ink-2);
    white-space: nowrap;
  }
  .price small{
    font-size: 10.5px; color: var(--muted); font-weight: 400;
    margin-right: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .loc{
    display:flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted);
  }
  .loc b{ color: var(--ink-2); font-weight: 500; }
  .loc .sep{ width:3px; height:3px; border-radius:50%; background: var(--muted-2); }
  .loc .rera{
    display:inline-flex; align-items: center; gap: 4px;
    margin-left: 4px;
    font-size: 10.5px;
    color: var(--accent-ink);
    font-weight: 500;
  }
  .loc .rera::before{
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; opacity: .7;
  }

  /* ============= PERSONA STRIP (the core differentiator) ============= */
  .strip{
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    display: grid;
    gap: 12px;
  }

  /* Builder strip: 3-up KPI mini-grid + progress bar */
  .strip.builder{
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .strip.builder .kpi{
    display: flex; flex-direction: column;
  }
  .strip.builder .kpi-k{
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted); font-weight: 500;
  }
  .strip.builder .kpi-v{
    font-family: var(--serif);
    font-size: 22px; font-weight: 300;
    line-height: 1.05; letter-spacing: -0.015em;
    color: var(--ink);
    margin-top: 2px;
  }
  .strip.builder .kpi-v small{
    font-family: var(--sans); font-size: 11px;
    color: var(--muted); margin-left: 2px;
  }
  .strip.builder .kpi-v.accent{ color: var(--accent-ink); }
  .strip.builder .kpi-d{
    font-size: 10.5px; color: var(--muted);
    margin-top: 2px;
  }
  .strip.builder .kpi-d .up{ color: #4A7A56; font-weight: 600; }
  .strip.builder .kpi-d .down{ color: #B5634C; font-weight: 600; }

  .strip-foot{
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 10px;
    margin-top: 4px;
  }
  .strip-foot .pl{
    flex: 1;
    height: 3px;
    background: var(--line);
    border-radius: 99px; overflow: hidden;
  }
  .strip-foot .pl i{
    display: block; height: 100%;
    background: var(--ink-2);
    border-radius: 99px;
  }
  .strip-foot small{
    font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-family: var(--mono);
  }

  /* Customer strip: 2 rows of feature pills + actions */
  .strip.customer{ grid-template-columns: 1fr; }
  .feat-pills{
    display: flex; gap: 6px;
    flex-wrap: wrap;
  }
  .fp{
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--ink-2);
    padding: 4px 9px;
    border-radius: 999px;
    background: var(--bg-2);
  }
  .fp svg{ opacity: .65; }
  .fp.dist{ background: var(--accent-tint); color: var(--accent-ink); }

  .cust-row{
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
  }
  .cust-emi{
    font-size: 12px; color: var(--muted);
  }
  .cust-emi b{
    font-family: var(--mono);
    color: var(--ink); font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .cust-actions{ display: flex; gap: 6px; }
  .mini-btn{
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg); color: var(--ink-2);
    display: grid; place-items: center;
    cursor: pointer;
  }
  .mini-btn:hover{ background: var(--hover); }
  .mini-btn.fill{
    background: var(--ink); color: #fff; border-color: var(--ink);
    width: auto;
    padding: 0 12px;
    font-size: 12px; font-weight: 500;
    gap: 5px;
  }

  /* Partner strip: lead counter + share */
  .strip.partner{ grid-template-columns: 1fr; }
  .partner-top{
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .com-block{
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--accent-tint);
    border: 1px solid var(--accent);
    display: inline-flex; flex-direction: column;
    line-height: 1.05;
  }
  .com-block .ck{
    font-size: 9.5px; letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-ink);
    opacity: 0.7;
  }
  .com-block .cv{
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--accent-ink);
  }
  .com-block .cv small{
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    opacity: 0.7;
  }
  .com-block.high{
    background: var(--accent-ink); border-color: var(--accent-ink);
  }
  .com-block.high .ck, .com-block.high .cv, .com-block.high .cv small{
    color: #fff;
  }

  .partner-meta{
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .partner-meta-l{ font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .partner-meta-v{
    font-size: 13.5px; color: var(--ink); font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .partner-meta-v .stagebar{
    display: inline-flex; gap: 2px;
  }
  .partner-meta-v .stagebar i{
    width: 5px; height: 14px;
    border-radius: 2px;
    background: var(--line);
  }
  .partner-meta-v .stagebar i.on{ background: var(--accent-ink); }

  .partner-actions{ display: flex; gap: 6px; }
  .wa-btn{
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px 7px 10px;
    border-radius: 999px;
    background: var(--accent-ink);
    color: #fff;
    border: none;
    font-family: var(--sans);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: background .3s ease;
  }

  .partner-bot{

      return `
        <button class="ovl-tr saved ${p.youSaved ? 'on' : ''}" title="${p.youSaved ? 'Saved' : 'Save'}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="${p.youSaved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.6"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        </button>
      `;
    }
    // partner
    return `<span class="ovl-tr commission ${p.commissionTier === 'high' ? 'high' : ''}">${p.commissionPct.toFixed(2)}% comm.</span>`;
  }

  function bottomLeftOverlay(p, persona){
    if (persona === 'builder'){
      return `
        <span class="ovl-bl">
          <span class="ppl"><span></span><span></span><span></span></span>
          <span><b>${p.cpCount}</b> CPs</span>
        </span>
      `;
    }
    if (persona === 'customer'){
      return `
        <span class="ovl-bl">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          <span><b>${p.savedBy}</b> others saved</span>
        </span>
      `;
    }
    // partner
    if (p.hot){
      return `
        <span class="ovl-bl" style="background: var(--accent-ink); color: #fff; border-color: var(--accent-ink);">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c2 6 7 7 7 12a7 7 0 11-14 0c0-3 2-4 3-7 1.5 2 3 2 4 0z"/></svg>
          <span>High velocity</span>
        </span>
      `;
    }
    return '';
  }

  function renderCard(p, persona, isFeat){
    let strip = '';
    if (persona === 'builder')  strip = builderStrip(p);
    if (persona === 'customer') strip = customerStrip(p);
    if (persona === 'partner')  strip = partnerStrip(p);

    return `
      <article class="card ${isFeat ? 'feat' : ''}" data-id="${p.id}">
        <div class="card-media">
          <div class="ph" data-tone="${p.tone}">
            <span class="ph-letter">${p.letter}</span>
          </div>
          <span class="ovl-tl ${statusClass(p.status)}">
            <span class="dot"></span>
            ${statusLabel(p.status)}
          </span>
          ${topRightOverlay(p, persona)}
          ${bottomLeftOverlay(p, persona)}
        </div>
        <div class="card-body">
          <div class="name-row">
            <h2 class="name">${p.name}</h2>
            <span class="price"><small>from</small>${p.priceFrom}</span>
          </div>
          <div class="loc">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11c0 5-9 11-9 11s-9-6-9-11a9 9 0 1118 0z"/><circle cx="12" cy="11" r="3"/></svg>
            ${p.loc.split(',')[0]}, <b>${p.loc.split(',')[1].trim()}</b>
            <span class="sep"></span>
            <span>${p.configs}</span>
            <span class="rera">RERA</span>
          </div>
          ${strip}
        </div>
      </article>
    `;
  }

  function renderGrid(persona){
    const grid = document.getElementById('grid');
    let html = '';
    PROJECTS.forEach((p, i) => {
      // featured only for builder + the first project (Skyline)
      const isFeat = (persona === 'builder' && p.isFeatured);
      html += renderCard(p, persona, isFeat);
    });
    // add-new card only for builder
    if (persona === 'builder'){
      html += `
        <div class="card-new">
          <div class="plus">+</div>
          <b>Launch a project</b>
          <small>It takes ~3 minutes</small>
        </div>
      `;
    }
    grid.innerHTML = html;

    // wire save toggle for customer
    grid.querySelectorAll('.ovl-tr.saved').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        btn.classList.toggle('on');
        const svg = btn.querySelector('svg');
        if (btn.classList.contains('on')) svg.setAttribute('fill', 'currentColor');
        else svg.setAttribute('fill', 'none');
      });
    });
    // link card -> detail
    grid.querySelectorAll('.card[data-id]').forEach(c => {
      c.addEventListener('click', () => {
        if (c.dataset.id === 'prestige-skyline'){
          window.location.href = 'Project Detail - Prestige Skyline.html';
        }
      });
    });
  }

  function renderHero(persona){
    const h = HERO[persona];
    document.getElementById('heroTitle').innerHTML = h.title;
    document.getElementById('heroSub').innerHTML = h.sub;
    document.getElementById('primaryCtaLabel').textContent = h.cta;
    document.getElementById('sidefootRole').textContent = h.role;

    // Summary
    const sumEl = document.getElementById('summary');
    sumEl.innerHTML = h.summary.map(s => `
      <div class="sm">
        <span class="sm-k">${s.k}</span>
        <span class="sm-v ${s.accent ? 'accent' : ''}">${s.v}</span>
      </div>
    `).join('');
  }

  function renderTabs(persona){
    const el = document.getElementById('filterTabs');
    el.innerHTML = TABS[persona].map((t, i) => `
      <button class="tab" data-k="${t.k}" aria-pressed="${i === 0 ? 'true' : 'false'}">
        ${t.label} <span class="ct">${t.ct}</span>
      </button>
    `).join('');
    el.querySelectorAll('.tab').forEach(b => {
      b.addEventListener('click', () => {
        el.querySelectorAll('.tab').forEach(x => x.setAttribute('aria-pressed', 'false'));
        b.setAttribute('aria-pressed', 'true');
      });
    });
  }

  function setPersona(p){
    document.body.setAttribute('data-persona', p);
    document.querySelectorAll('.persona-btn').forEach(b => {
      b.setAttribute('aria-pressed', b.dataset.p === p ? 'true' : 'false');
    });
    renderHero(p);
    renderTabs(p);
    renderGrid(p);
  }

  /* ============ INIT ============ */
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.persona-btn').forEach(b => {
      b.addEventListener('click', () => setPersona(b.dataset.p));
    });
    setPersona('builder');
  });
</script>

</body>
</html>
