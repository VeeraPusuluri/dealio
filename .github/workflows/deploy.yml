name: Deploy Frontend (Amplify)

# This repo's git root is the parent `Dealio/` folder; the frontend app lives in
# the `Dealio_frontend/` subfolder, so build steps run there. The workflow itself
# must stay at the repo root (.github/workflows) for GitHub Actions to run it.
#
# Runs lint + production build as a gate, then triggers an AWS Amplify release
# job. Amplify builds/hosts using Dealio_frontend/amplify.yml (its app-root is
# configured to Dealio_frontend in the Amplify console).
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   AWS_DEPLOY_ROLE_ARN  arn of the IAM role assumed via OIDC (see .github/DEPLOYMENT.md)
#   AMPLIFY_APP_ID       the Amplify app id (e.g. d123abc456xyz)

on:
  push:
    branches: [main]
    paths:
      - 'Dealio_frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  AMPLIFY_BRANCH: main

jobs:
  ci:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dealio_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Dealio_frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Trigger Amplify release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start Amplify job and wait
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          set -euo pipefail
          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --query 'jobSummary.jobId' --output text)
          echo "Started Amplify job $JOB_ID"

          while true; do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' --output text)
            echo "Amplify job status: $STATUS"
            case "$STATUS" in
              SUCCEED) echo "Deploy succeeded"; exit 0 ;;
              FAILED|CANCELLED) echo "Deploy failed"; exit 1 ;;
              *) sleep 15 ;;
            esac
          done
