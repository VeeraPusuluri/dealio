name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Detect which parts of the repo changed ────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      schema:   ${{ steps.filter.outputs.schema }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Dealio_Backend/**'
            frontend:
              - 'Dealio_frontend/**'
            schema:
              - 'Dealio_Backend/prisma/schema.prisma'

  # ── Deploy backend ────────────────────────────────────────────────────────
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        working-directory: Dealio_Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_BACKEND_SERVICE }} --detach

  # ── Deploy frontend ───────────────────────────────────────────────────────
  deploy-frontend:
    needs: [changes, deploy-backend]
    # Run if frontend changed OR backend changed (backend URL may be baked in)
    # Uses always() so it still runs even if deploy-backend was skipped
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        working-directory: Dealio_frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_FRONTEND_SERVICE }} --detach
